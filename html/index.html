<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_upward" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <title>Convite - Sonho de Menina</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <header>
           
            <img src="/img/titulo.png" alt="Flores decorativas" class="decorative-image">
             <!-- Botões -->
        <nav class="buttons">
            <a href="#participantes" class="button">Participantes</a>
            
            <a href="#informacoes" class="button">Informações</a>
        </nav>
        </header>

        <!-- Seção principal -->
        <main class="main section-fade" id="main">
            <img src="/img/menina-titulo.png" alt="Menina com coroa" class="main-image">
            <div class="flower-border"></div>
           <p>Prepare-se para uma noite inesquecível, onde os sonhos de 15 anos ganham vida e as lembranças se tornam eternas! Venha celebrar essa data mágica com a gente!</p>
            
        </main>
        
        <section class="participantes section-fade" id="participantes">
            <div class="flower-border-section"></div>
            <img src="/img/page-girl.png" alt="">
            <button onclick="window.location.href='#main';" class="button voltar-btn"><span class="material-symbols-outlined">
                arrow_upward
                </span></button>
            
        </section>
    
        <section class="Informacoes section-fade" id="informacoes">
            
            <h1>Informações</h1>
            <div class="flower-border-section"></div>
            <div class="dados">
            <div class="info">
                <p>BUENÓPOLIS Clube</p>
                <p>21:00 Horas</p>
                <p>30/11/2024</p>
            </div>
           <div class="mapa"> <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3797.304268253692!2d-44.1796809!3d-17.8712207!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xa963db637961a9%3A0x843134b1c7cb7d84!2sBuen%C3%B3polis%20Clube!5e0!3m2!1spt-BR!2sbr!4v1732476453947!5m2!1spt-BR!2sbr"  style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
            </div>
        </section>
        <button onclick="window.location.href='#main';" class="button voltar-btn"><span class="material-symbols-outlined">
            arrow_upward
            </span></button>
    </div>
    <footer>
        Francilene S. Pires 2024 (38)99740-4136
    </footer>
    
</body>
</html>
